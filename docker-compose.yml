services:
  db:
    image: postgres:16-alpine
    environment:
      # The OWNER role owns the schema and is used ONLY by migrations + seed.
      # The application never connects as this role.
      POSTGRES_USER: agencydesk_owner
      POSTGRES_PASSWORD: owner_pw
      POSTGRES_DB: agencydesk
    volumes:
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agencydesk_owner -d agencydesk"]
      interval: 2s
      timeout: 3s
      retries: 40

  api:
    build: ./backend
    environment:
      # Migrations / seed run as the owner (bypasses RLS by design).
      OWNER_DATABASE_URL: postgresql+psycopg://agencydesk_owner:owner_pw@db:5432/agencydesk
      # The API runs as an unprivileged role that CANNOT bypass row-level security.
      DATABASE_URL: postgresql+psycopg://agencydesk_app:app_pw@db:5432/agencydesk
      TEST_OWNER_DATABASE_URL: postgresql+psycopg://agencydesk_owner:owner_pw@db:5432/agencydesk_test
      TEST_DATABASE_URL: postgresql+psycopg://agencydesk_app:app_pw@db:5432/agencydesk_test
      JWT_SECRET: dev-secret-change-me
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/srv
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Invoked via `sh` rather than executed directly: the bind mount above
    # replaces the image's copy with the host's, and a host checkout on Windows
    # or a fresh clone may not carry the executable bit.
    command: ["sh", "./entrypoint.sh"]

  web:
    build: ./frontend
    environment:
      # Inside the network the API is a sibling container, not localhost. Vite's
      # default target is the localhost one, so this override is what makes the
      # dockerised path work.
      VITE_API_TARGET: http://api:8000
    volumes:
      - ./frontend:/srv
      - /srv/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
